<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Comparador de Cartas MTG</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f3f4f6;
      color: #111827;
    }

    .container {
      max-width: 1200px;
      margin: auto;
      padding: 24px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 30px;
    }

    p {
      color: #6b7280;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-top: 24px;
    }

    .card {
      background: #fff;
      padding: 20px;
      border-radius: 18px;
      box-shadow: 0 12px 30px rgba(0,0,0,.08);
    }

    label {
      font-weight: bold;
      display: block;
      margin-bottom: 10px;
    }

    textarea {
      width: 100%;
      min-height: 340px;
      resize: vertical;
      padding: 14px;
      border: 1px solid #d1d5db;
      border-radius: 12px;
      font-size: 14px;
    }

    input[type="file"] {
      width: 100%;
      padding: 14px;
      border-radius: 12px;
      border: 1px dashed #9ca3af;
      background: #f9fafb;
    }

    button {
      border: none;
      border-radius: 12px;
      padding: 14px 18px;
      background: #111827;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      background: #374151;
    }

    .actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin: 24px 0;
    }

    .summary {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
      margin-bottom: 24px;
    }

    .summary div {
      background: white;
      padding: 18px;
      border-radius: 16px;
      box-shadow: 0 12px 30px rgba(0,0,0,.08);
    }

    .summary strong {
      display: block;
      font-size: 28px;
      margin-top: 8px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: white;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 12px 30px rgba(0,0,0,.08);
      margin: 14px 0 28px;
    }

    th, td {
      padding: 13px;
      border-bottom: 1px solid #e5e7eb;
      text-align: left;
      font-size: 14px;
    }

    th {
      background: #111827;
      color: white;
    }

    .badge {
      display: inline-block;
      padding: 5px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: bold;
    }

    .ok {
      background: #dcfce7;
      color: #166534;
    }

    .parcial {
      background: #fef3c7;
      color: #92400e;
    }

    .faltando {
      background: #fee2e2;
      color: #991b1b;
    }

    @media (max-width: 800px) {
      .grid,
      .summary {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>Comparador de Cartas MTG</h1>
    <p>Importe o CSV do vendedor, cole sua lista e compare automaticamente.</p>

    <div class="grid">
      <div class="card">
        <label>CSV do vendedor</label>
        <input type="file" id="csvVendedor" accept=".csv,text/csv" />
        <p id="statusCsv">Nenhum CSV carregado.</p>
      </div>

      <div class="card">
        <label>Sua lista</label>
        <textarea id="listaDesejada">Deck
1 Desolate Mire
1 Choked Estuary
1 Glacial Fortress
1 Shineshadow Snarl
1 Fetid Heath
1 Bojuka Bog
1 Contaminated Landscape
1 Arcane Sanctum
1 Skycloud Expanse
1 Restoration Magic
1 Sigil of Sleep
1 Sejiri Shelter
1 Baral, Chief of Compliance
1 Exsanguinate
1 Baleful Strix
1 Long River's Pull
1 Mai, Scornful Striker
1 Papalymo Totolymo
1 Narset's Reversal
1 Arcane Signet
1 Talisman of Dominance
1 Talisman of Hierarchy
1 Talisman of Progress
1 Steel of the Godhead
1 Absorb
1 Alisaie Leveilleur
1 Archmage's Charm
1 Bender's Waterskin
1 As Foretold
1 Disallow
1 Unwind
1 Survival Cache
1 Perplex
1 Eye of Nidhogg
1 G'raha Tia, Scion Reborn
1 Ghostly Prison
1 Propaganda
1 Timely Ward
1 Windfall
1 Vindicate
1 Alphinaud Leveilleur
1 Archmage Emeritus
1 Chameleon, Master of Disguise
1 Circle of Power
1 Dancer's Chakrams
1 Crushing Disappointment
1 Syphon Mind
1 Helm of the Ghastlord
1 Emet-Selch of the Third Seat
1 Y'shtola, Night's Blessed
1 Fandaniel, Telophoroi Ascian
1 Cleansing Nova
1 Starfall Invocation
1 Sublime Epiphany</textarea>
      </div>
    </div>

    <div class="actions">
      <button onclick="compararCartas()">Comparar</button>
      <button onclick="copiarPedido()">Copiar pedido ao vendedor</button>
      <button onclick="limparResultado()">Limpar resultado</button>
    </div>

    <div class="summary">
      <div>
        Encontradas
        <strong id="totalEncontradas">0</strong>
      </div>
      <div>
        Para pedir
        <strong id="totalPedir">0</strong>
      </div>
      <div>
        Faltando
        <strong id="totalFaltando">0</strong>
      </div>
    </div>

    <div id="resultado"></div>
  </div>

  <script>
    let linhasCsvVendedor = [];
    let pedidoCopiar = "";

    document.getElementById("csvVendedor").addEventListener("change", function () {
      const arquivo = this.files[0];

      if (!arquivo) return;

      const leitor = new FileReader();

      leitor.onload = function (evento) {
        const texto = evento.target.result;
        linhasCsvVendedor = lerCsv(texto);

        document.getElementById("statusCsv").textContent =
          `${linhasCsvVendedor.length} linhas carregadas do CSV.`;
      };

      leitor.readAsText(arquivo, "UTF-8");
    });

    function normalizar(texto) {
      return String(texto || "")
        .replace(/^\uFEFF/, "")
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "")
        .toLowerCase()
        .replace(/\([^)]*\)/g, "")
        .replace(/\[[^\]]*\]/g, "")
        .replace(/["“”]/g, "")
        .replace(/[’`´]/g, "'")
        .replace(/[^a-z0-9' ]/g, " ")
        .replace(/\s+/g, " ")
        .trim();
    }

    function detectarSeparador(linha) {
      const separadores = [",", ";", "\t"];
      let melhor = ",";
      let maior = 0;

      separadores.forEach(sep => {
        const qtd = linha.split(sep).length;
        if (qtd > maior) {
          maior = qtd;
          melhor = sep;
        }
      });

      return melhor;
    }

    function separarLinhaCsv(linha, separador) {
      const colunas = [];
      let atual = "";
      let dentroAspas = false;

      for (let i = 0; i < linha.length; i++) {
        const char = linha[i];
        const proximo = linha[i + 1];

        if (char === '"' && dentroAspas && proximo === '"') {
          atual += '"';
          i++;
        } else if (char === '"') {
          dentroAspas = !dentroAspas;
        } else if (char === separador && !dentroAspas) {
          colunas.push(atual.trim());
          atual = "";
        } else {
          atual += char;
        }
      }

      colunas.push(atual.trim());
      return colunas;
    }

    function lerCsv(texto) {
      const linhas = texto
        .split(/\r?\n/)
        .map(linha => linha.trim())
        .filter(Boolean);

      if (linhas.length === 0) return [];

      const separador = detectarSeparador(linhas[0]);

      return linhas.map(linha => separarLinhaCsv(linha, separador));
    }

    function lerListaDesejada(texto) {
      const linhas = texto
        .split(/\r?\n/)
        .map(linha => linha.trim())
        .filter(Boolean);

      const cartas = [];

      linhas.forEach(linha => {
        const lower = linha.toLowerCase();

        if (
          lower === "deck" ||
          lower === "sideboard" ||
          lower.startsWith("//")
        ) {
          return;
        }

        const match = linha.match(/^(\d+)\s+(.+)$/);

        if (!match) return;

        cartas.push({
          nome: match[2].trim(),
          nomeNormalizado: normalizar(match[2]),
          quantidade: parseInt(match[1], 10)
        });
      });

      return cartas;
    }

    function extrairQuantidadeDaLinha(colunas) {
      for (const coluna of colunas) {
        const valor = String(coluna).trim();

        if (/^\d+$/.test(valor)) {
          const numero = parseInt(valor, 10);

          if (numero > 0 && numero < 9999) {
            return numero;
          }
        }
      }

      return 1;
    }

    function linhaTemCarta(colunas, nomeNormalizado) {
      return colunas.some(coluna => {
        const texto = normalizar(coluna);

        if (!texto) return false;

        if (texto === nomeNormalizado) return true;

        if (texto.includes(nomeNormalizado)) return true;

        return false;
      });
    }

    function buscarCartaNoVendedor(cartaDesejada) {
      let quantidadeTotal = 0;
      let linhasEncontradas = 0;

      linhasCsvVendedor.forEach(colunas => {
        if (linhaTemCarta(colunas, cartaDesejada.nomeNormalizado)) {
          quantidadeTotal += extrairQuantidadeDaLinha(colunas);
          linhasEncontradas++;
        }
      });

      return {
        quantidade: quantidadeTotal,
        linhas: linhasEncontradas
      };
    }

    function compararCartas() {
      const resultado = document.getElementById("resultado");

      if (linhasCsvVendedor.length === 0) {
        alert("Carregue primeiro o CSV do vendedor.");
        return;
      }

      const listaTexto = document.getElementById("listaDesejada").value;
      const desejadas = lerListaDesejada(listaTexto);

      const encontradas = [];
      const faltando = [];

      desejadas.forEach(carta => {
        const vendedor = buscarCartaNoVendedor(carta);

        const qtdVendedor = vendedor.quantidade;
        const qtdPedir = Math.min(carta.quantidade, qtdVendedor);
        const qtdFaltando = Math.max(carta.quantidade - qtdVendedor, 0);

        if (qtdVendedor > 0) {
          encontradas.push({
            nome: carta.nome,
            quero: carta.quantidade,
            vendedor: qtdVendedor,
            pedir: qtdPedir,
            falta: qtdFaltando
          });
        } else {
          faltando.push({
            nome: carta.nome,
            quero: carta.quantidade,
            vendedor: 0,
            pedir: 0,
            falta: carta.quantidade
          });
        }
      });

      pedidoCopiar = encontradas
        .map(carta => `${carta.pedir} ${carta.nome}`)
        .join("\n");

      document.getElementById("totalEncontradas").textContent = encontradas.length;
      document.getElementById("totalPedir").textContent =
        encontradas.reduce((soma, carta) => soma + carta.pedir, 0);
      document.getElementById("totalFaltando").textContent =
        encontradas.reduce((soma, carta) => soma + carta.falta, 0) +
        faltando.reduce((soma, carta) => soma + carta.falta, 0);

      resultado.innerHTML = montarTabela(encontradas, faltando);
    }

    function montarTabela(encontradas, faltando) {
      let html = "";

      html += `
        <h2>Cartas que o vendedor tem</h2>
        <table>
          <thead>
            <tr>
              <th>Carta</th>
              <th>Você quer</th>
              <th>Vendedor tem</th>
              <th>Pedir</th>
              <th>Faltam</th>
              <th>Status</th>
            </tr>
          </thead>
          <tbody>
      `;

      if (encontradas.length === 0) {
        html += `<tr><td colspan="6">Nenhuma carta encontrada.</td></tr>`;
      } else {
        encontradas.forEach(carta => {
          html += `
            <tr>
              <td>${escaparHtml(carta.nome)}</td>
              <td>${carta.quero}</td>
              <td>${carta.vendedor}</td>
              <td>${carta.pedir}</td>
              <td>${carta.falta}</td>
              <td>
                <span class="badge ${carta.falta === 0 ? "ok" : "parcial"}">
                  ${carta.falta === 0 ? "Completo" : "Parcial"}
                </span>
              </td>
            </tr>
          `;
        });
      }

      html += `
          </tbody>
        </table>
      `;

      html += `
        <h2>Cartas que faltam totalmente</h2>
        <table>
          <thead>
            <tr>
              <th>Carta</th>
              <th>Quantidade faltando</th>
              <th>Status</th>
            </tr>
          </thead>
          <tbody>
      `;

      if (faltando.length === 0) {
        html += `<tr><td colspan="3">Nenhuma carta faltando totalmente.</td></tr>`;
      } else {
        faltando.forEach(carta => {
          html += `
            <tr>
              <td>${escaparHtml(carta.nome)}</td>
              <td>${carta.falta}</td>
              <td><span class="badge faltando">Faltando</span></td>
            </tr>
          `;
        });
      }

      html += `
          </tbody>
        </table>
      `;

      return html;
    }

    function copiarPedido() {
      if (!pedidoCopiar) {
        alert("Compare as cartas primeiro.");
        return;
      }

      navigator.clipboard.writeText(pedidoCopiar)
        .then(() => alert("Pedido copiado!"))
        .catch(() => alert("Não foi possível copiar automaticamente."));
    }

    function limparResultado() {
      document.getElementById("resultado").innerHTML = "";
      document.getElementById("totalEncontradas").textContent = "0";
      document.getElementById("totalPedir").textContent = "0";
      document.getElementById("totalFaltando").textContent = "0";
      pedidoCopiar = "";
    }

    function escaparHtml(texto) {
      return String(texto)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }
  </script>
</body>
</html>
