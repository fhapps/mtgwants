<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Comparador de Cartas MTG</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      color: #111827;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 24px;
    }

    h1 {
      margin-bottom: 8px;
      font-size: 28px;
    }

    p {
      color: #6b7280;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-top: 24px;
    }

    .card {
      background: #fff;
      border-radius: 18px;
      padding: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,.08);
    }

    label {
      display: block;
      font-weight: bold;
      margin-bottom: 10px;
    }

    textarea {
      width: 100%;
      min-height: 320px;
      resize: vertical;
      padding: 14px;
      border-radius: 12px;
      border: 1px solid #d1d5db;
      font-size: 14px;
    }

    input[type="file"] {
      width: 100%;
      padding: 14px;
      border-radius: 12px;
      border: 1px dashed #9ca3af;
      background: #f9fafb;
    }

    button {
      border: none;
      border-radius: 12px;
      padding: 14px 18px;
      font-weight: bold;
      cursor: pointer;
      background: #111827;
      color: white;
      transition: .2s;
    }

    button:hover {
      background: #374151;
    }

    .actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin: 24px 0;
    }

    .result {
      margin-top: 20px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 14px;
      background: white;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 10px 30px rgba(0,0,0,.08);
    }

    th, td {
      padding: 14px;
      border-bottom: 1px solid #e5e7eb;
      text-align: left;
      font-size: 14px;
    }

    th {
      background: #111827;
      color: white;
    }

    .badge {
      display: inline-block;
      padding: 5px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: bold;
    }

    .ok {
      background: #dcfce7;
      color: #166534;
    }

    .faltando {
      background: #fee2e2;
      color: #991b1b;
    }

    .summary {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
      margin-top: 20px;
    }

    .summary div {
      background: white;
      padding: 18px;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,.08);
    }

    .summary strong {
      display: block;
      font-size: 26px;
      margin-top: 8px;
    }

    @media (max-width: 800px) {
      .grid, .summary {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>Comparador de Cartas MTG</h1>
    <p>Importe o CSV do vendedor, cole sua lista de cartas e clique em comparar.</p>

    <div class="grid">
      <div class="card">
        <label>CSV do vendedor</label>
        <input type="file" id="csvVendedor" accept=".csv,text/csv" />
        <p id="statusCsv">Nenhum arquivo carregado.</p>
      </div>

      <div class="card">
        <label>Sua lista</label>
        <textarea id="listaDesejada">Deck
1 Desolate Mire
1 Choked Estuary
1 Glacial Fortress
1 Shineshadow Snarl
1 Fetid Heath
1 Bojuka Bog
1 Contaminated Landscape
1 Arcane Sanctum
1 Skycloud Expanse
1 Restoration Magic
1 Sigil of Sleep
1 Sejiri Shelter
1 Baral, Chief of Compliance
1 Exsanguinate
1 Baleful Strix
1 Long River's Pull
1 Mai, Scornful Striker
1 Papalymo Totolymo
1 Narset's Reversal
1 Arcane Signet
1 Talisman of Dominance
1 Talisman of Hierarchy
1 Talisman of Progress
1 Steel of the Godhead
1 Absorb
1 Alisaie Leveilleur
1 Archmage's Charm
1 Bender's Waterskin
1 As Foretold
1 Disallow
1 Unwind
1 Survival Cache
1 Perplex
1 Eye of Nidhogg
1 G'raha Tia, Scion Reborn
1 Ghostly Prison
1 Propaganda
1 Timely Ward
1 Windfall
1 Vindicate
1 Alphinaud Leveilleur
1 Archmage Emeritus
1 Chameleon, Master of Disguise
1 Circle of Power
1 Dancer's Chakrams
1 Crushing Disappointment
1 Syphon Mind
1 Helm of the Ghastlord
1 Emet-Selch of the Third Seat
1 Y'shtola, Night's Blessed
1 Fandaniel, Telophoroi Ascian
1 Cleansing Nova
1 Starfall Invocation
1 Sublime Epiphany</textarea>
      </div>
    </div>

    <div class="actions">
      <button onclick="compararCartas()">Comparar</button>
      <button onclick="copiarPedido()">Copiar pedido ao vendedor</button>
      <button onclick="limparTudo()">Limpar resultado</button>
    </div>

    <div class="summary">
      <div>
        Cartas encontradas
        <strong id="totalEncontradas">0</strong>
      </div>
      <div>
        Quantidade disponível
        <strong id="totalDisponivel">0</strong>
      </div>
      <div>
        Quantidade faltando
        <strong id="totalFaltando">0</strong>
      </div>
    </div>

    <div class="result" id="resultado"></div>
  </div>

  <script>
    let cartasVendedor = {};
    let pedidoCopiar = "";

    const csvInput = document.getElementById("csvVendedor");
    const statusCsv = document.getElementById("statusCsv");

    csvInput.addEventListener("change", function () {
      const file = this.files[0];

      if (!file) {
        statusCsv.textContent = "Nenhum arquivo carregado.";
        return;
      }

      const reader = new FileReader();

      reader.onload = function (e) {
        const texto = e.target.result;
        cartasVendedor = lerCsvVendedor(texto);
        statusCsv.textContent = `${Object.keys(cartasVendedor).length} cartas carregadas do vendedor.`;
      };

      reader.readAsText(file, "UTF-8");
    });

    function normalizarNome(nome) {
      return String(nome || "")
        .replace(/^\uFEFF/, "")
        .trim()
        .toLowerCase()
        .replace(/\s+/g, " ");
    }

    function separarCsvLinha(linha) {
      const resultado = [];
      let atual = "";
      let dentroAspas = false;

      for (let i = 0; i < linha.length; i++) {
        const char = linha[i];
        const proximo = linha[i + 1];

        if (char === '"' && dentroAspas && proximo === '"') {
          atual += '"';
          i++;
        } else if (char === '"') {
          dentroAspas = !dentroAspas;
        } else if (char === "," && !dentroAspas) {
          resultado.push(atual.trim());
          atual = "";
        } else {
          atual += char;
        }
      }

      resultado.push(atual.trim());
      return resultado;
    }

    function lerCsvVendedor(csv) {
      const linhas = csv
        .split(/\r?\n/)
        .map(linha => linha.trim())
        .filter(Boolean);

      if (linhas.length === 0) return {};

      const cabecalho = separarCsvLinha(linhas[0]).map(c => normalizarNome(c));

      let indiceNome = cabecalho.findIndex(c =>
        c.includes("name") ||
        c.includes("nome") ||
        c.includes("card")
      );

      let indiceQtd = cabecalho.findIndex(c =>
        c.includes("quantity") ||
        c.includes("quantidade") ||
        c === "qty" ||
        c === "qtd"
      );

      if (indiceNome === -1) indiceNome = 0;
      if (indiceQtd === -1) indiceQtd = 1;

      const mapa = {};

      for (let i = 1; i < linhas.length; i++) {
        const colunas = separarCsvLinha(linhas[i]);

        const nomeOriginal = colunas[indiceNome];
        const nomeNormalizado = normalizarNome(nomeOriginal);

        if (!nomeNormalizado) continue;

        let quantidade = parseInt(colunas[indiceQtd], 10);

        if (isNaN(quantidade)) {
          quantidade = 1;
        }

        if (!mapa[nomeNormalizado]) {
          mapa[nomeNormalizado] = {
            nome: nomeOriginal.trim(),
            quantidade: 0
          };
        }

        mapa[nomeNormalizado].quantidade += quantidade;
      }

      return mapa;
    }

    function lerListaDesejada(texto) {
      const linhas = texto
        .split(/\r?\n/)
        .map(linha => linha.trim())
        .filter(Boolean);

      const mapa = {};

      linhas.forEach(linha => {
        if (linha.toLowerCase() === "deck") return;
        if (linha.toLowerCase().startsWith("sideboard")) return;

        const match = linha.match(/^(\d+)\s+(.+)$/);

        if (!match) return;

        const quantidade = parseInt(match[1], 10);
        const nome = match[2].trim();
        const chave = normalizarNome(nome);

        if (!mapa[chave]) {
          mapa[chave] = {
            nome,
            quantidade: 0
          };
        }

        mapa[chave].quantidade += quantidade;
      });

      return mapa;
    }

    function compararCartas() {
      const listaTexto = document.getElementById("listaDesejada").value;
      const desejadas = lerListaDesejada(listaTexto);

      const encontradas = [];
      const faltando = [];

      Object.keys(desejadas).forEach(chave => {
        const cartaDesejada = desejadas[chave];
        const cartaVendedor = cartasVendedor[chave];

        const qtdDesejada = cartaDesejada.quantidade;
        const qtdVendedor = cartaVendedor ? cartaVendedor.quantidade : 0;
        const qtdParaPedir = Math.min(qtdDesejada, qtdVendedor);
        const qtdFaltando = Math.max(qtdDesejada - qtdVendedor, 0);

        if (qtdVendedor > 0) {
          encontradas.push({
            nome: cartaDesejada.nome,
            deseja: qtdDesejada,
            vendedor: qtdVendedor,
            pedir: qtdParaPedir,
            falta: qtdFaltando
          });
        } else {
          faltando.push({
            nome: cartaDesejada.nome,
            deseja: qtdDesejada,
            vendedor: 0,
            pedir: 0,
            falta: qtdDesejada
          });
        }
      });

      pedidoCopiar = encontradas
        .map(carta => `${carta.pedir} ${carta.nome}`)
        .join("\n");

      const totalEncontradas = encontradas.length;
      const totalDisponivel = encontradas.reduce((total, carta) => total + carta.pedir, 0);
      const totalFaltando =
        encontradas.reduce((total, carta) => total + carta.falta, 0) +
        faltando.reduce((total, carta) => total + carta.falta, 0);

      document.getElementById("totalEncontradas").textContent = totalEncontradas;
      document.getElementById("totalDisponivel").textContent = totalDisponivel;
      document.getElementById("totalFaltando").textContent = totalFaltando;

      renderizarResultado(encontradas, faltando);
    }

    function renderizarResultado(encontradas, faltando) {
      const resultado = document.getElementById("resultado");

      if (Object.keys(cartasVendedor).length === 0) {
        resultado.innerHTML = "<p>Carregue o CSV do vendedor antes de comparar.</p>";
        return;
      }

      let html = "";

      html += `
        <h2>Cartas que o vendedor tem</h2>
        <table>
          <thead>
            <tr>
              <th>Carta</th>
              <th>Você quer</th>
              <th>Vendedor tem</th>
              <th>Pedir</th>
              <th>Faltam</th>
              <th>Status</th>
            </tr>
          </thead>
          <tbody>
      `;

      if (encontradas.length === 0) {
        html += `
          <tr>
            <td colspan="6">Nenhuma carta encontrada no CSV do vendedor.</td>
          </tr>
        `;
      } else {
        encontradas.forEach(carta => {
          html += `
            <tr>
              <td>${escaparHtml(carta.nome)}</td>
              <td>${carta.deseja}</td>
              <td>${carta.vendedor}</td>
              <td>${carta.pedir}</td>
              <td>${carta.falta}</td>
              <td>
                <span class="badge ${carta.falta === 0 ? "ok" : "faltando"}">
                  ${carta.falta === 0 ? "Completo" : "Parcial"}
                </span>
              </td>
            </tr>
          `;
        });
      }

      html += `
          </tbody>
        </table>
      `;

      html += `
        <h2>Cartas que faltam totalmente</h2>
        <table>
          <thead>
            <tr>
              <th>Carta</th>
              <th>Quantidade faltando</th>
            </tr>
          </thead>
          <tbody>
      `;

      if (faltando.length === 0) {
        html += `
          <tr>
            <td colspan="2">Nenhuma carta faltando totalmente.</td>
          </tr>
        `;
      } else {
        faltando.forEach(carta => {
          html += `
            <tr>
              <td>${escaparHtml(carta.nome)}</td>
              <td>${carta.falta}</td>
            </tr>
          `;
        });
      }

      html += `
          </tbody>
        </table>
      `;

      resultado.innerHTML = html;
    }

    function copiarPedido() {
      if (!pedidoCopiar) {
        alert("Compare as cartas primeiro.");
        return;
      }

      navigator.clipboard.writeText(pedidoCopiar)
        .then(() => {
          alert("Pedido copiado para a área de transferência!");
        })
        .catch(() => {
          alert("Não foi possível copiar automaticamente.");
        });
    }

    function limparTudo() {
      document.getElementById("resultado").innerHTML = "";
      document.getElementById("totalEncontradas").textContent = "0";
      document.getElementById("totalDisponivel").textContent = "0";
      document.getElementById("totalFaltando").textContent = "0";
      pedidoCopiar = "";
    }

    function escaparHtml(texto) {
      return String(texto)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }
  </script>
</body>
</html>
